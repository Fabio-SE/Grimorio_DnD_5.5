<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#12091f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Grimório">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <title>Grimório D&D 2024</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap');

    :root {
      --bg:        #0d0718;
      --surface:   #130d24;
      --surface2:  #1c1438;
      --surface3:  #251b4a;
      --border:    #281e42;
      --border2:   #3a2960;
      --text:      #ede8f8;
      --text2:     #7a60a8;
      --text3:     #4a3870;
      --gold:      #c8960e;
      --gold2:     #f0c840;
      --gold-dim:  #6a4a06;
      --gold-glow: #c8960e33;
      --ambient:   #c8960e;   /* changes per active school */
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'EB Garamond', Georgia, serif;
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ══════════════════════════════════════
       AMBIENT BACKGROUND — star field
    ══════════════════════════════════════ */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        radial-gradient(1px 1px at 12% 18%, #ffffff22 0%, transparent 100%),
        radial-gradient(1px 1px at 34% 72%, #ffffff18 0%, transparent 100%),
        radial-gradient(1px 1px at 56% 35%, #ffffff1a 0%, transparent 100%),
        radial-gradient(1px 1px at 78% 55%, #ffffff15 0%, transparent 100%),
        radial-gradient(1px 1px at 91% 22%, #ffffff20 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 23% 88%, #ffffff12 0%, transparent 100%),
        radial-gradient(1px 1px at 67% 91%, #ffffff16 0%, transparent 100%),
        radial-gradient(2px 2px at 8% 45%, var(--ambient) 0%, transparent 100%),
        radial-gradient(2px 2px at 92% 80%, var(--ambient) 0%, transparent 100%);
      opacity: 0.5;
      transition: opacity 1s;
    }

    /* ══════════════════════════════════════
       TOP BAR
    ══════════════════════════════════════ */
    .topbar {
      background: linear-gradient(180deg, #160e2d 0%, var(--surface) 100%);
      border-bottom: 1px solid var(--border);
      padding: calc(var(--safe-top) + 12px) 16px 10px;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
      /* ambient color bleeds through bottom edge */
      box-shadow: 0 1px 0 var(--border), 0 2px 20px #00000066;
    }
    /* golden rule line */
    .topbar::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--ambient) 40%, var(--gold2) 50%, var(--ambient) 60%, transparent 100%);
      opacity: 0.5;
      transition: background 0.6s ease;
    }

    .topbar-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .topbar-title {
      font-family: 'Cinzel', serif;
      font-size: 17px;
      font-weight: 900;
      color: var(--gold2);
      letter-spacing: 3px;
      text-shadow: 0 0 24px var(--gold-glow), 0 0 60px var(--gold-glow);
      animation: titlePulse 4s ease-in-out infinite;
    }
    @keyframes titlePulse {
      0%, 100% { text-shadow: 0 0 16px var(--gold-glow), 0 0 40px var(--gold-glow); }
      50%       { text-shadow: 0 0 28px #c8960e55, 0 0 70px #c8960e22; }
    }
    .topbar-count {
      font-size: 11px;
      color: var(--text3);
      font-family: 'Cinzel', serif;
      letter-spacing: 0.5px;
    }

    /* Search */
    .search-wrap { position: relative; margin-bottom: 8px; }
    .search-icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--text3); font-size: 14px; pointer-events: none;
    }
    #search {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 9px 12px 9px 36px;
      color: var(--text);
      font-size: 16px;
      font-family: inherit;
      outline: none;
      -webkit-appearance: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    #search::placeholder { color: var(--text3); }
    #search:focus {
      border-color: var(--ambient);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--ambient) 15%, transparent),
                  inset 0 1px 0 #ffffff08;
    }

    /* Filter rows */
    .filters {
      display: flex;
      gap: 5px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 1px;
    }
    .filters::-webkit-scrollbar { display: none; }
    .filter-row-wrap { display: flex; flex-direction: column; gap: 5px; }
    .filter-label {
      font-family: 'Cinzel', serif;
      font-size: 7.5px;
      font-weight: 700;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--text3);
      padding: 0 2px;
      flex-shrink: 0;
      opacity: 0.8;
    }
    .filter-row { display: flex; align-items: center; gap: 6px; }
    .filters-divider {
      height: 1px;
      background: linear-gradient(90deg, var(--border2), transparent);
      margin: 1px 0;
    }

    /* Chips */
    .chip {
      flex-shrink: 0;
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      font-family: 'Cinzel', serif;
      color: var(--text3);
      background: transparent;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.18s;
      letter-spacing: 0.3px;
    }
    .chip:active { transform: scale(0.95); }
    .chip.active {
      color: #fff;
      border-color: var(--chip-color, var(--gold));
      background: color-mix(in srgb, var(--chip-color, var(--gold)) 22%, transparent);
      box-shadow: 0 0 12px color-mix(in srgb, var(--chip-color, var(--gold)) 40%, transparent),
                  inset 0 1px 0 #ffffff18;
    }

    /* Toggle chips */
    .toggle-chip {
      flex-shrink: 0;
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      font-family: 'Cinzel', serif;
      color: var(--text3);
      background: transparent;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .toggle-chip .toggle-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--toggle-color, var(--gold));
      opacity: 0.3;
      transition: all 0.18s;
      flex-shrink: 0;
    }
    .toggle-chip.active {
      color: #fff;
      border-color: var(--toggle-color, var(--gold));
      background: color-mix(in srgb, var(--toggle-color, var(--gold)) 18%, transparent);
      box-shadow: 0 0 10px color-mix(in srgb, var(--toggle-color, var(--gold)) 35%, transparent);
    }
    .toggle-chip.active .toggle-dot { opacity: 1; box-shadow: 0 0 4px var(--toggle-color, var(--gold)); }

    /* ══════════════════════════════════════
       CONTENT AREA
    ══════════════════════════════════════ */
    .content { flex: 1; overflow: hidden; display: flex; flex-direction: column; position: relative; z-index: 1; }
    .tab-panel { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .tab-panel.active { display: flex; }
    .list-wrap {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }

    /* ══════════════════════════════════════
       CIRCLE SECTION HEADERS — torn divider
    ══════════════════════════════════════ */
    .section-header {
      position: relative;
      margin-top: 4px;
    }
    /* torn SVG edge above label */
    .section-torn {
      display: block;
      width: 100%;
      height: 10px;
      overflow: hidden;
    }
    .section-torn svg { display: block; width: 100%; height: 100%; }
    .section-label {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text3);
      padding: 4px 16px 6px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label::before, .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border2), transparent);
    }
    .section-label::before { background: linear-gradient(90deg, transparent, var(--border2)); }

    /* ══════════════════════════════════════
       SPELL ITEMS
    ══════════════════════════════════════ */
    .spell-item {
      display: flex;
      align-items: center;
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      gap: 12px;
      transition: background 0.12s;
      position: relative;
      overflow: hidden;
    }
    /* gradient bleed from school color */
    .spell-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 48px;
      background: linear-gradient(90deg, color-mix(in srgb, var(--school-color) 14%, transparent) 0%, transparent 100%);
      pointer-events: none;
    }
    .spell-item:active { background: var(--surface2); }

    .school-bar {
      width: 2px;
      align-self: stretch;
      border-radius: 1px;
      background: var(--school-color);
      flex-shrink: 0;
      opacity: 0.9;
      box-shadow: 0 0 6px var(--school-color);
    }

    .spell-item-body { flex: 1; min-width: 0; }
    .spell-item-name {
      font-family: 'Cinzel', serif;
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }
    .spell-item-sub {
      font-size: 12.5px;
      color: var(--text2);
      margin-top: 1px;
    }
    .spell-item-sub .school-name { color: var(--school-color); }

    .spell-item-right {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }
    .mini-tag {
      font-size: 8.5px;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      padding: 2px 5px;
      border-radius: 3px;
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.3px;
    }
    .fav-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 17px;
      line-height: 1;
      padding: 4px;
      color: var(--text3);
      transition: all 0.15s;
      border-radius: 50%;
    }
    .fav-btn.saved {
      color: var(--gold2);
      text-shadow: 0 0 10px var(--gold), 0 0 20px #c8960e44;
      animation: starPop 0.3s ease;
    }
    @keyframes starPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.4); }
      100% { transform: scale(1); }
    }
    .fav-btn:active { transform: scale(1.3); }
    .chevron { color: var(--text3); font-size: 14px; opacity: 0.6; }

    /* ══════════════════════════════════════
       EMPTY STATES
    ══════════════════════════════════════ */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 60px 32px;
      text-align: center;
      gap: 14px;
    }
    .empty-icon { font-size: 44px; opacity: 0.2; }
    .empty-title {
      font-family: 'Cinzel', serif;
      font-size: 14px;
      letter-spacing: 1px;
      color: var(--text3);
    }
    .empty-sub { font-size: 14px; color: var(--text3); opacity: 0.6; line-height: 1.6; font-style: italic; }

    /* ══════════════════════════════════════
       BOTTOM NAV
    ══════════════════════════════════════ */
    .bottom-nav {
      background: linear-gradient(0deg, #0a0614 0%, var(--surface) 100%);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: var(--safe-bottom);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }
    .bottom-nav::before {
      content: '';
      position: absolute;
      top: -1px; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--ambient), transparent);
      opacity: 0.4;
      transition: background 0.6s;
    }
    .nav-btn {
      flex: 1;
      background: none;
      border: none;
      cursor: pointer;
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      color: var(--text3);
      transition: color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-btn.active { color: var(--gold2); }
    .nav-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
    .nav-label { font-family: 'Cinzel', serif; font-size: 8.5px; letter-spacing: 0.8px; }
    .nav-badge {
      position: absolute;
      top: 6px; right: calc(50% - 18px);
      background: var(--gold);
      color: #000;
      font-size: 8px;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      min-width: 15px;
      height: 15px;
      border-radius: 8px;
      padding: 0 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      display: none;
      box-shadow: 0 0 8px var(--gold-glow);
    }
    .nav-badge.visible { display: flex; }

    /* ══════════════════════════════════════
       DETAIL SHEET — atmospheric redesign
    ══════════════════════════════════════ */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(5, 2, 14, 0.8);
      z-index: 200;
      display: none;
      align-items: flex-end;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .overlay.open { display: flex; }

    .sheet {
      background: var(--surface);
      border-radius: 22px 22px 0 0;
      width: 100%;
      max-height: 94dvh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(var(--safe-bottom) + 32px);
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      border: 1px solid var(--border2);
      border-bottom: none;
    }
    .overlay.open .sheet { transform: translateY(0); }

    .sheet-handle {
      width: 32px; height: 3px;
      background: var(--border2);
      border-radius: 2px;
      margin: 12px auto 0;
    }

    /* Atmospheric hero section of the sheet */
    .sheet-hero {
      position: relative;
      padding: 20px 20px 18px;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
    }
    /* radial glow behind the school color */
    .sheet-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 100% 120% at 85% 50%,
        color-mix(in srgb, var(--sheet-color, #888) 20%, transparent) 0%,
        transparent 70%);
      pointer-events: none;
    }
    /* large ghost school label */
    .sheet-school-ghost {
      position: absolute;
      right: 16px; bottom: -4px;
      font-family: 'Cinzel', serif;
      font-size: 52px;
      font-weight: 900;
      letter-spacing: -1px;
      color: var(--sheet-color, #888);
      opacity: 0.07;
      line-height: 1;
      pointer-events: none;
      white-space: nowrap;
      text-transform: uppercase;
    }
    /* top accent line */
    .sheet-hero::after {
      content: '';
      position: absolute;
      top: 0; left: 20px; right: 20px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--sheet-color, var(--gold)), transparent);
      opacity: 0.7;
      border-radius: 1px;
    }

    .sheet-hero-top {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      position: relative;
    }
    .sheet-hero-text { flex: 1; min-width: 0; }
    .sheet-name {
      font-family: 'Cinzel', serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.15;
      margin-bottom: 10px;
      text-shadow: 0 0 30px color-mix(in srgb, var(--sheet-color, transparent) 30%, transparent);
    }
    .sheet-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .sheet-circle {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .sheet-tag {
      font-size: 9.5px;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 4px;
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.3px;
    }
    .sheet-fav-btn {
      background: color-mix(in srgb, var(--sheet-color, var(--gold)) 10%, var(--surface2));
      border: 1px solid color-mix(in srgb, var(--sheet-color, var(--border2)) 40%, var(--border2));
      border-radius: 10px;
      padding: 8px 14px;
      cursor: pointer;
      transition: all 0.18s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text3);
      font-family: 'Cinzel', serif;
      font-size: 11px;
    }
    .sheet-fav-btn .star { font-size: 17px; line-height: 1; }
    .sheet-fav-btn.saved {
      border-color: var(--gold);
      color: var(--gold2);
      background: #c8960e18;
      box-shadow: 0 0 12px #c8960e22;
    }
    .sheet-fav-btn:active { transform: scale(0.95); }

    /* Props grid */
    .sheet-props {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--border);
    }
    .sheet-prop {
      padding: 12px 20px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .sheet-prop:nth-child(even) { border-right: none; }
    .sheet-prop-label {
      font-family: 'Cinzel', serif;
      font-size: 8.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 5px;
      opacity: 0.8;
    }
    .sheet-prop-val {
      font-size: 14px;
      color: var(--text);
      line-height: 1.35;
    }

    /* Description */
    .sheet-body { padding: 18px 20px; }
    .sheet-desc {
      font-size: 17px;
      line-height: 1.76;
      color: var(--text);
    }
    .sheet-upcast {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 8px;
      background: var(--surface2);
      border-left: 2px solid var(--text3);
      font-size: 15px;
      line-height: 1.65;
      color: var(--text2);
      font-style: italic;
      position: relative;
    }
    .sheet-upcast-label {
      font-style: normal;
      display: block;
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
      opacity: 0.7;
    }

    /* Classes */
    .sheet-classes { padding: 0 20px 10px; border-top: 1px solid var(--border); }
    .sheet-classes-label {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text3);
      padding: 14px 0 8px;
    }
    .sheet-classes-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .class-pill {
      font-size: 12.5px;
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid var(--border2);
      color: var(--text2);
      background: var(--surface2);
    }

    /* ══════════════════════════════════════
       LOADING
    ══════════════════════════════════════ */
    .loading {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      flex: 1; gap: 16px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-family: 'Cinzel', serif; font-size: 12px; color: var(--text3); letter-spacing: 1.5px; }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-row">
    <div class="topbar-title">✦ Grimório</div>
    <div class="topbar-count" id="spell-count">— magias</div>
  </div>
  <div class="search-wrap" id="search-wrap">
    <span class="search-icon">⟲</span>
    <input type="search" id="search" placeholder="Buscar magia…" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <div class="filter-row-wrap" id="filter-wrap">
    <div class="filter-row">
      <span class="filter-label">Escola</span>
      <div class="filters" id="school-filters"></div>
    </div>
    <div class="filters-divider"></div>
    <div class="filter-row">
      <span class="filter-label">Classe</span>
      <div class="filters" id="class-filters"></div>
    </div>
    <div class="filters-divider"></div>
    <div class="filter-row">
      <span class="filter-label">Conjuração</span>
      <div class="filters" id="casttime-filters"></div>
    </div>
    <div class="filters-divider"></div>
    <div class="filter-row">
      <span class="filter-label">Tipo</span>
      <div class="filters" id="toggle-filters"></div>
    </div>
  </div>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- TAB: Todas -->
  <div class="tab-panel active" id="tab-all">
    <div class="list-wrap" id="list-all">
      <div class="loading">
        <div class="spinner"></div>
        <div class="loading-text">Carregando grimório…</div>
      </div>
    </div>
  </div>

  <!-- TAB: Favoritos -->
  <div class="tab-panel" id="tab-fav">
    <div class="list-wrap" id="list-fav"></div>
  </div>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-all" onclick="switchTab('all')">
    <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    <span class="nav-label">Todas</span>
  </button>
  <button class="nav-btn" id="nav-fav" onclick="switchTab('fav')" style="position:relative">
    <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    <span class="nav-label">Grimório</span>
    <span class="nav-badge" id="fav-badge">0</span>
  </button>
</nav>

<!-- DETAIL OVERLAY -->
<div class="overlay" id="overlay">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hero" id="sheet-hero">
      <div class="sheet-school-ghost" id="sheet-school-ghost"></div>
      <div class="sheet-hero-top">
        <div class="sheet-hero-text">
          <div class="sheet-name" id="sheet-name"></div>
          <div class="sheet-meta" id="sheet-meta"></div>
        </div>
        <button class="sheet-fav-btn" id="sheet-fav-btn" onclick="toggleFavFromSheet()">
          <span class="star" id="sheet-fav-star">☆</span>
          <span id="sheet-fav-label">Salvar</span>
        </button>
      </div>
    </div>
    <div class="sheet-props" id="sheet-props"></div>
    <div class="sheet-body">
      <div class="sheet-desc" id="sheet-desc"></div>
      <div class="sheet-upcast" id="sheet-upcast" style="display:none"></div>
    </div>
    <div class="sheet-classes">
      <div class="sheet-classes-label">Classes</div>
      <div class="sheet-classes-list" id="sheet-classes"></div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   SCHOOL CONFIG
══════════════════════════════════════ */
const SC = {
  "Evocação":     "#c0392b",
  "Abjuração":    "#1a6bbf",
  "Encantamento": "#8e24aa",
  "Ilusão":       "#00897b",
  "Invocação":    "#7d5a4f",
  "Transmutação": "#2e7d32",
  "Adivinhação":  "#e67e00",
  "Necromancia":  "#546e7a",
};

const CLASS_ICONS = {
  "Bardo":"🎵","Bruxo":"🕷","Clérigo":"⛪","Druida":"🌿",
  "Feiticeiro":"🌟","Guardião":"🏹","Mago":"📚","Paladino":"⚔️","Ladino":"🗡️",
};

const CLASS_COLORS = {
  "Bardo":      "#c2185b",
  "Clérigo":    "#f57c00",
  "Druida":     "#558b2f",
  "Feiticeiro": "#6a1b9a",
  "Guardião":   "#00838f",
  "Mago":       "#1565c0",
  "Paladino":   "#b8860b",
  "Ladino":     "#546e7a",
};

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let allSpells = [];
let activeSchool   = null;
let activeClass    = null;
let activeCastTime = null;   // null | cast-time key string
let filterConc     = false;  // toggle: Concentração
let filterRitual   = false;  // toggle: Ritual
let searchVal = '';
let currentTab = 'all';
let currentSpell = null;
let favorites = new Set(JSON.parse(localStorage.getItem('grimorio-favs') || '[]'));

function saveFavs() {
  localStorage.setItem('grimorio-favs', JSON.stringify([...favorites]));
}

/* ══════════════════════════════════════
   TAB SWITCHING
══════════════════════════════════════ */
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-all').classList.toggle('active', tab === 'all');
  document.getElementById('tab-fav').classList.toggle('active', tab === 'fav');
  document.getElementById('nav-all').classList.toggle('active', tab === 'all');
  document.getElementById('nav-fav').classList.toggle('active', tab === 'fav');
  document.getElementById('search-wrap').style.display = tab === 'all' ? '' : 'none';
  document.getElementById('filter-wrap').style.display  = tab === 'all' ? '' : 'none';

  if (tab === 'fav') renderFavs();
}

/* ══════════════════════════════════════
   RENDER HELPERS
══════════════════════════════════════ */
function circleLabel(c) { return c === 0 ? 'Truque' : `${c}º Círculo`; }

function spellItemHTML(s, idx, listId) {
  const color = SC[s.school] || '#888';
  const isSaved = favorites.has(s.name);
  const tags = [
    s.concentration ? `<span class="mini-tag" style="background:${color}88">C</span>` : '',
    s.ritual        ? `<span class="mini-tag" style="background:#44336688">R</span>` : '',
  ].join('');

  return `<div class="spell-item" style="--school-color:${color}" data-list="${listId}" data-idx="${idx}">
    <div class="school-bar" style="background:${color}"></div>
    <div class="spell-item-body">
      <div class="spell-item-name">${s.name}</div>
      <div class="spell-item-sub">${circleLabel(s.circle)} · <span class="school-name" style="color:${color}">${s.school}</span></div>
    </div>
    <div class="spell-item-right">
      ${tags}
      <button class="fav-btn ${isSaved ? 'saved' : ''}" data-name="${s.name}" onclick="toggleFav(event,'${s.name}','${listId}')">
        ${isSaved ? '★' : '☆'}
      </button>
      <span class="chevron">›</span>
    </div>
  </div>`;
}

function attachListeners(container, spellArray, listId) {
  container.querySelectorAll(`.spell-item[data-list="${listId}"]`).forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.closest('.fav-btn')) return;
      openDetail(spellArray[+el.dataset.idx]);
    });
  });
}

/* ══════════════════════════════════════
   RENDER ALL
══════════════════════════════════════ */
function renderAll() {
  const q = searchVal.toLowerCase().trim();
  const list = allSpells.filter(s => {
    if (activeSchool   && s.school !== activeSchool)          return false;
    if (activeClass    && !s.classes.includes(activeClass))   return false;
    if (activeCastTime && !CAST_TIMES[activeCastTime].match(s)) return false;
    if (filterConc     && !s.concentration)                   return false;
    if (filterRitual   && !s.ritual)                          return false;
    if (q              && !s._search.includes(q))             return false;
    return true;
  });

  const wrap = document.getElementById('list-all');
  document.getElementById('spell-count').textContent = `${list.length} magia${list.length !== 1 ? 's' : ''}`;

  if (list.length === 0) {
    wrap.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">Nenhuma magia encontrada</div></div>`;
    return;
  }

  // Group by circle
  const groups = {};
  list.forEach(s => {
    const k = s.circle;
    if (!groups[k]) groups[k] = [];
    groups[k].push(s);
  });

  let html = '';
  let idx = 0;
  const globalList = [];

  Object.keys(groups).sort((a,b) => +a - +b).forEach(circle => {
    const label = circle === '0' ? 'Truques' : `${circle}º Círculo`;
    html += `<div class="section-header">
      <div class="section-label">${label}</div>
    </div>`;
    groups[circle].forEach(s => {
      html += spellItemHTML(s, globalList.length, 'all');
      globalList.push(s);
    });
  });

  wrap.innerHTML = html;
  attachListeners(wrap, globalList, 'all');
}

/* ══════════════════════════════════════
   RENDER FAVS
══════════════════════════════════════ */
function renderFavs() {
  const favSpells = allSpells.filter(s => favorites.has(s.name));
  const wrap = document.getElementById('list-fav');

  if (favSpells.length === 0) {
    wrap.innerHTML = `<div class="empty">
      <div class="empty-icon">☆</div>
      <div class="empty-title">Grimório vazio</div>
      <div class="empty-sub">Toque em ☆ em qualquer magia<br>para adicioná-la aqui</div>
    </div>`;
    return;
  }

  let html = `<div class="section-label">${favSpells.length} magia${favSpells.length !== 1 ? 's' : ''} salva${favSpells.length !== 1 ? 's' : ''}</div>`;
  favSpells.forEach((s, i) => { html += spellItemHTML(s, i, 'fav'); });

  wrap.innerHTML = html;
  attachListeners(wrap, favSpells, 'fav');
}

/* ══════════════════════════════════════
   FAVORITES
══════════════════════════════════════ */
function toggleFav(e, name, listId) {
  e.stopPropagation();
  const btn = e.currentTarget;

  if (favorites.has(name)) {
    favorites.delete(name);
    btn.classList.remove('saved');
    btn.textContent = '☆';
  } else {
    favorites.add(name);
    btn.classList.add('saved');
    btn.textContent = '★';
  }
  saveFavs();
  updateBadge();

  // Sync the other list's button for same spell
  document.querySelectorAll(`.fav-btn[data-name="${name}"]`).forEach(b => {
    b.classList.toggle('saved', favorites.has(name));
    b.textContent = favorites.has(name) ? '★' : '☆';
  });

  // Sync sheet button if open
  if (currentSpell && currentSpell.name === name) updateSheetFavBtn();

  if (listId === 'fav') renderFavs();
}

function toggleFavFromSheet() {
  if (!currentSpell) return;
  const name = currentSpell.name;
  if (favorites.has(name)) { favorites.delete(name); } else { favorites.add(name); }
  saveFavs();
  updateBadge();
  updateSheetFavBtn();

  // Sync list buttons
  document.querySelectorAll(`.fav-btn[data-name="${name}"]`).forEach(b => {
    b.classList.toggle('saved', favorites.has(name));
    b.textContent = favorites.has(name) ? '★' : '☆';
  });

  if (currentTab === 'fav') renderFavs();
}

function updateSheetFavBtn() {
  if (!currentSpell) return;
  const isSaved = favorites.has(currentSpell.name);
  const btn = document.getElementById('sheet-fav-btn');
  document.getElementById('sheet-fav-star').textContent = isSaved ? '★' : '☆';
  document.getElementById('sheet-fav-label').textContent = isSaved ? 'Salvo' : 'Salvar';
  btn.classList.toggle('saved', isSaved);
}

function updateBadge() {
  const badge = document.getElementById('fav-badge');
  const n = favorites.size;
  badge.textContent = n;
  badge.classList.toggle('visible', n > 0);
}

/* ══════════════════════════════════════
   DETAIL SHEET
══════════════════════════════════════ */
function openDetail(s) {
  currentSpell = s;
  const color = SC[s.school] || '#888';

  // Set CSS var for the hero atmospheric glow
  const hero = document.getElementById('sheet-hero');
  hero.style.setProperty('--sheet-color', color);

  // Ghost school name in the background
  document.getElementById('sheet-school-ghost').textContent = s.school;

  document.getElementById('sheet-name').textContent = s.name;

  document.getElementById('sheet-meta').innerHTML = [
    `<span class="sheet-circle" style="color:${color}">${circleLabel(s.circle)} · ${s.school}</span>`,
    s.concentration ? `<span class="sheet-tag" style="background:color-mix(in srgb,${color} 30%,#000)">Concentração</span>` : '',
    s.ritual ? `<span class="sheet-tag" style="background:#33226688">Ritual</span>` : '',
  ].filter(Boolean).join('');

  document.getElementById('sheet-props').innerHTML = [
    ['Tempo de Conjuração', s.castTime],
    ['Alcance', s.range],
    ['Duração', s.duration],
    ['Componentes', s.components],
  ].map(([l, v]) => `<div class="sheet-prop">
    <div class="sheet-prop-label" style="color:${color}">${l}</div>
    <div class="sheet-prop-val">${v || '—'}</div>
  </div>`).join('');

  document.getElementById('sheet-desc').textContent = s.description;

  const upEl = document.getElementById('sheet-upcast');
  if (s.upcast) {
    upEl.style.display = '';
    upEl.style.borderLeftColor = color;
    upEl.innerHTML = `<span class="sheet-upcast-label" style="color:${color}">Círculo Superior</span>${s.upcast}`;
  } else {
    upEl.style.display = 'none';
  }

  document.getElementById('sheet-classes').innerHTML = s.classes.map(c =>
    `<span class="class-pill">${CLASS_ICONS[c] || ''} ${c}</span>`
  ).join('');

  updateSheetFavBtn();

  const overlay = document.getElementById('overlay');
  overlay.classList.add('open');
  // Scroll sheet to top
  document.getElementById('sheet').scrollTop = 0;
}

function closeDetail() {
  document.getElementById('overlay').classList.remove('open');
  currentSpell = null;
}

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeDetail();
});

// Swipe down to close
let ty0 = 0;
const sheet = document.getElementById('sheet');
sheet.addEventListener('touchstart', e => { ty0 = e.touches[0].clientY; }, { passive: true });
sheet.addEventListener('touchend', e => {
  if (e.changedTouches[0].clientY - ty0 > 80 && sheet.scrollTop === 0) closeDetail();
}, { passive: true });

/* ══════════════════════════════════════
   SCHOOL FILTERS
══════════════════════════════════════ */
function buildFilters() {
  const c = document.getElementById('school-filters');
  let html = `<button class="chip active" style="--chip-color:var(--gold)" data-school="">Todas</button>`;
  Object.entries(SC).forEach(([school, color]) => {
    html += `<button class="chip" style="--chip-color:${color}" data-school="${school}">${school}</button>`;
  });
  c.innerHTML = html;
  c.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => {
      activeSchool = btn.dataset.school || null;
      c.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      // Update ambient glow color
      const ambientColor = activeSchool ? SC[activeSchool] : 'var(--gold)';
      document.documentElement.style.setProperty('--ambient', activeSchool ? SC[activeSchool] : '#c8960e');
      renderAll();
    });
  });
}

/* ══════════════════════════════════════
   CLASS FILTERS
══════════════════════════════════════ */
const CLASSES = ['Bardo','Clérigo','Druida','Feiticeiro','Guardião','Mago','Paladino','Ladino'];

function buildClassFilters() {
  const c = document.getElementById('class-filters');
  let html = `<button class="chip active" style="--chip-color:var(--gold)" data-class="">Todas</button>`;
  CLASSES.forEach(cls => {
    const color = CLASS_COLORS[cls] || '#888';
    const icon  = CLASS_ICONS[cls]  || '';
    html += `<button class="chip" style="--chip-color:${color}" data-class="${cls}">${icon} ${cls}</button>`;
  });
  c.innerHTML = html;
  c.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => {
      activeClass = btn.dataset.class || null;
      c.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderAll();
    });
  });
}

/* ══════════════════════════════════════
   CAST TIME FILTERS
══════════════════════════════════════ */
const CAST_TIMES = {
  'Ação':       { label: 'Ação',       match: s => /^1 [Aa]ção(?!\s*[Bb]ônus)/i.test(s.castTime) },
  'Ação Bônus': { label: 'Ação Bônus', match: s => /[Bb]ônus/i.test(s.castTime) },
  'Reação':     { label: 'Reação',     match: s => /[Rr]ea[çc]ão/i.test(s.castTime) },
  '1 Minuto':   { label: '1 Minuto',   match: s => /[Mm]inuto/i.test(s.castTime) },
};

function buildCastTimeFilters() {
  const c = document.getElementById('casttime-filters');
  let html = `<button class="chip active" style="--chip-color:var(--gold)" data-cast="">Qualquer</button>`;
  Object.keys(CAST_TIMES).forEach(key => {
    html += `<button class="chip" style="--chip-color:var(--text2)" data-cast="${key}">${CAST_TIMES[key].label}</button>`;
  });
  c.innerHTML = html;
  c.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCastTime = btn.dataset.cast || null;
      c.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderAll();
    });
  });
}

/* ══════════════════════════════════════
   TOGGLE FILTERS (Concentração / Ritual)
══════════════════════════════════════ */
function buildToggleFilters() {
  const c = document.getElementById('toggle-filters');
  c.innerHTML = `
    <button class="toggle-chip" id="toggle-conc" style="--toggle-color:#d4a820" data-toggle="conc">
      <span class="toggle-dot"></span>Concentração
    </button>
    <button class="toggle-chip" id="toggle-ritual" style="--toggle-color:#9b59b6" data-toggle="ritual">
      <span class="toggle-dot"></span>Ritual
    </button>`;
  document.getElementById('toggle-conc').addEventListener('click', () => {
    filterConc = !filterConc;
    document.getElementById('toggle-conc').classList.toggle('active', filterConc);
    renderAll();
  });
  document.getElementById('toggle-ritual').addEventListener('click', () => {
    filterRitual = !filterRitual;
    document.getElementById('toggle-ritual').classList.toggle('active', filterRitual);
    renderAll();
  });
}
document.getElementById('search').addEventListener('input', e => {
  searchVal = e.target.value;
  renderAll();
});

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
fetch('spells.json')
  .then(r => r.json())
  .then(data => {
    allSpells = data;
    allSpells.sort((a, b) => {
      if (a.circle !== b.circle) return a.circle - b.circle;
      return a.name.localeCompare(b.name, 'pt-BR');
    });
    // Pre-build search index: name + school + description
    allSpells.forEach(s => {
      s._search = `${s.name} ${s.school} ${s.description || ''}`.toLowerCase();
    });
    buildFilters();
    buildClassFilters();
    buildCastTimeFilters();
    buildToggleFilters();
    renderAll();
    updateBadge();
  })
  .catch(() => {
    document.getElementById('list-all').innerHTML =
      `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Erro ao carregar</div><div class="empty-sub">Verifique o arquivo spells.json</div></div>`;
  });

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
