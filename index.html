<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#12091f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Grimório">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <title>Grimório D&D 2024</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap');

    :root {
      --bg:        #12091f;
      --surface:   #1c1030;
      --surface2:  #261845;
      --surface3:  #301f55;
      --border:    #332255;
      --border2:   #442f77;
      --text:      #ede8f8;
      --text2:     #8870b0;
      --text3:     #5a4880;
      --gold:      #d4a820;
      --gold2:     #f0c840;
      --gold-dim:  #7a5a08;
      --red:       #e05060;
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'EB Garamond', Georgia, serif;
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ══════════════════════════════════════
       TOP BAR
    ══════════════════════════════════════ */
    .topbar {
      background: linear-gradient(180deg, #1e1238 0%, var(--surface) 100%);
      border-bottom: 1px solid var(--border);
      padding: calc(var(--safe-top) + 14px) 16px 12px;
      flex-shrink: 0;
      position: relative;
    }
    .topbar::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    }

    .topbar-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .topbar-title {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 2px;
      text-shadow: 0 0 20px #d4a82044;
    }
    .topbar-count {
      font-size: 12px;
      color: var(--text3);
      font-family: 'Cinzel', serif;
      letter-spacing: 0.5px;
    }

    /* Search */
    .search-wrap { position: relative; margin-bottom: 10px; }
    .search-icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--text3); font-size: 14px; pointer-events: none;
    }
    #search {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px 10px 36px;
      color: var(--text);
      font-size: 16px;
      font-family: inherit;
      outline: none;
      -webkit-appearance: none;
      transition: border-color 0.2s;
    }
    #search::placeholder { color: var(--text3); }
    #search:focus { border-color: var(--gold-dim); background: var(--surface3); }

    /* School chips */
    .filters {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 1px;
    }
    .filters::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      font-family: 'Cinzel', serif;
      color: var(--text3);
      background: transparent;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .chip.active {
      color: #fff;
      border-color: var(--chip-color, var(--gold));
      background: var(--chip-color, var(--gold));
      box-shadow: 0 0 10px var(--chip-color, var(--gold))44;
    }

    /* ══════════════════════════════════════
       CONTENT AREA
    ══════════════════════════════════════ */
    .content {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .tab-panel { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .tab-panel.active { display: flex; }

    .list-wrap {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }

    /* ══════════════════════════════════════
       SPELL ITEMS
    ══════════════════════════════════════ */
    .section-label {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text3);
      padding: 12px 16px 4px;
    }

    .spell-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      gap: 12px;
      transition: background 0.1s;
      position: relative;
    }
    .spell-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--school-color, transparent);
      opacity: 0;
      transition: opacity 0.15s;
    }
    .spell-item:active { background: var(--surface2); }
    .spell-item:active::before { opacity: 1; }

    .school-bar {
      width: 3px;
      align-self: stretch;
      border-radius: 2px;
      background: var(--school-color);
      flex-shrink: 0;
      opacity: 0.7;
    }

    .spell-item-body { flex: 1; min-width: 0; }
    .spell-item-name {
      font-family: 'Cinzel', serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }
    .spell-item-sub {
      font-size: 13px;
      color: var(--text2);
      margin-top: 2px;
    }
    .spell-item-sub .school-name { color: var(--school-color); }

    .spell-item-right {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .mini-tag {
      font-size: 9px;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      padding: 2px 5px;
      border-radius: 4px;
      color: rgba(255,255,255,0.85);
    }
    .fav-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 4px;
      color: var(--text3);
      transition: all 0.15s;
      border-radius: 50%;
    }
    .fav-btn.saved { color: var(--gold); text-shadow: 0 0 8px var(--gold)88; }
    .fav-btn:active { transform: scale(1.3); }
    .chevron { color: var(--text3); font-size: 16px; }

    /* ══════════════════════════════════════
       EMPTY STATES
    ══════════════════════════════════════ */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 60px 32px;
      text-align: center;
      gap: 12px;
    }
    .empty-icon { font-size: 48px; opacity: 0.3; }
    .empty-title {
      font-family: 'Cinzel', serif;
      font-size: 15px;
      color: var(--text3);
    }
    .empty-sub { font-size: 14px; color: var(--text3); opacity: 0.7; line-height: 1.5; }

    /* ══════════════════════════════════════
       BOTTOM NAV
    ══════════════════════════════════════ */
    .bottom-nav {
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: var(--safe-bottom);
      flex-shrink: 0;
      position: relative;
    }
    .bottom-nav::before {
      content: '';
      position: absolute;
      top: -1px; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    }
    .nav-btn {
      flex: 1;
      background: none;
      border: none;
      cursor: pointer;
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      color: var(--text3);
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-btn.active { color: var(--gold); }
    .nav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .nav-label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.5px; }
    .nav-badge {
      position: absolute;
      top: 6px; right: calc(50% - 18px);
      background: var(--gold);
      color: #000;
      font-size: 9px;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      min-width: 16px;
      height: 16px;
      border-radius: 8px;
      padding: 0 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      display: none;
    }
    .nav-badge.visible { display: flex; }

    /* ══════════════════════════════════════
       DETAIL SHEET
    ══════════════════════════════════════ */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      display: none;
      align-items: flex-end;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .overlay.open { display: flex; }

    .sheet {
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-height: 94dvh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(var(--safe-bottom) + 32px);
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
      border-top: 1px solid var(--border2);
    }
    .overlay.open .sheet { transform: translateY(0); }

    .sheet-handle {
      width: 36px; height: 4px;
      background: var(--border2);
      border-radius: 2px;
      margin: 14px auto 0;
    }

    .sheet-school-strip {
      height: 4px;
      margin: 12px 20px 0;
      border-radius: 2px;
      background: var(--school-color, var(--gold));
    }

    .sheet-header {
      padding: 14px 20px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .sheet-header-text { flex: 1; min-width: 0; }
    .sheet-name {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 8px;
    }
    .sheet-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .sheet-circle {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .sheet-tag {
      font-size: 10px;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 6px;
      color: rgba(255,255,255,0.9);
    }
    .sheet-fav-btn {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 8px 14px;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text3);
      font-family: 'Cinzel', serif;
      font-size: 12px;
    }
    .sheet-fav-btn .star { font-size: 18px; line-height: 1; }
    .sheet-fav-btn.saved { border-color: var(--gold); color: var(--gold); background: #d4a82011; }
    .sheet-fav-btn:active { transform: scale(0.95); }

    /* Props */
    .sheet-props {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--border);
    }
    .sheet-prop {
      padding: 12px 20px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .sheet-prop:nth-child(even) { border-right: none; }
    .sheet-prop-label {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
    }
    .sheet-prop-val {
      font-size: 14px;
      color: var(--text);
      font-weight: 500;
      line-height: 1.35;
    }

    /* Description */
    .sheet-body { padding: 18px 20px; }
    .sheet-desc {
      font-size: 17px;
      line-height: 1.72;
      color: var(--text);
    }
    .sheet-upcast {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 10px;
      background: var(--surface2);
      border-left: 3px solid var(--text3);
      font-size: 15px;
      line-height: 1.65;
      color: var(--text2);
      font-style: italic;
    }
    .sheet-upcast-label {
      font-style: normal;
      display: block;
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    /* Classes */
    .sheet-classes { padding: 0 20px 8px; border-top: 1px solid var(--border); }
    .sheet-classes-label {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text3);
      padding: 14px 0 8px;
    }
    .sheet-classes-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .class-pill {
      font-size: 13px;
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      color: var(--text2);
      background: var(--surface2);
    }

    /* ══════════════════════════════════════
       LOADING
    ══════════════════════════════════════ */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 16px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-family: 'Cinzel', serif; font-size: 13px; color: var(--text3); letter-spacing: 1px; }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-row">
    <div class="topbar-title">✦ Grimório</div>
    <div class="topbar-count" id="spell-count">— magias</div>
  </div>
  <div class="search-wrap" id="search-wrap">
    <span class="search-icon">⟲</span>
    <input type="search" id="search" placeholder="Buscar magia…" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <div class="filters" id="school-filters"></div>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- TAB: Todas -->
  <div class="tab-panel active" id="tab-all">
    <div class="list-wrap" id="list-all">
      <div class="loading">
        <div class="spinner"></div>
        <div class="loading-text">Carregando grimório…</div>
      </div>
    </div>
  </div>

  <!-- TAB: Favoritos -->
  <div class="tab-panel" id="tab-fav">
    <div class="list-wrap" id="list-fav"></div>
  </div>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-all" onclick="switchTab('all')">
    <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    <span class="nav-label">Todas</span>
  </button>
  <button class="nav-btn" id="nav-fav" onclick="switchTab('fav')" style="position:relative">
    <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    <span class="nav-label">Grimório</span>
    <span class="nav-badge" id="fav-badge">0</span>
  </button>
</nav>

<!-- DETAIL OVERLAY -->
<div class="overlay" id="overlay">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-school-strip" id="sheet-strip"></div>
    <div class="sheet-header">
      <div class="sheet-header-text">
        <div class="sheet-name" id="sheet-name"></div>
        <div class="sheet-meta" id="sheet-meta"></div>
      </div>
      <button class="sheet-fav-btn" id="sheet-fav-btn" onclick="toggleFavFromSheet()">
        <span class="star" id="sheet-fav-star">☆</span>
        <span id="sheet-fav-label">Salvar</span>
      </button>
    </div>
    <div class="sheet-props" id="sheet-props"></div>
    <div class="sheet-body">
      <div class="sheet-desc" id="sheet-desc"></div>
      <div class="sheet-upcast" id="sheet-upcast" style="display:none"></div>
    </div>
    <div class="sheet-classes">
      <div class="sheet-classes-label">Classes</div>
      <div class="sheet-classes-list" id="sheet-classes"></div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   SCHOOL CONFIG
══════════════════════════════════════ */
const SC = {
  "Evocação":     "#c0392b",
  "Abjuração":    "#1a6bbf",
  "Encantamento": "#8e24aa",
  "Ilusão":       "#00897b",
  "Invocação":    "#7d5a4f",
  "Transmutação": "#2e7d32",
  "Adivinhação":  "#e67e00",
  "Necromancia":  "#546e7a",
};

const CLASS_ICONS = {
  "Bardo":"🎵","Bruxo":"🕷","Clérigo":"⛪","Druida":"🌿",
  "Feiticeiro":"🌟","Guardião":"🏹","Mago":"📚","Paladino":"⚔",
};

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let allSpells = [];
let activeSchool = null;
let searchVal = '';
let currentTab = 'all';
let currentSpell = null;
let favorites = new Set(JSON.parse(localStorage.getItem('grimorio-favs') || '[]'));

function saveFavs() {
  localStorage.setItem('grimorio-favs', JSON.stringify([...favorites]));
}

/* ══════════════════════════════════════
   TAB SWITCHING
══════════════════════════════════════ */
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-all').classList.toggle('active', tab === 'all');
  document.getElementById('tab-fav').classList.toggle('active', tab === 'fav');
  document.getElementById('nav-all').classList.toggle('active', tab === 'all');
  document.getElementById('nav-fav').classList.toggle('active', tab === 'fav');
  document.getElementById('search-wrap').style.display = tab === 'all' ? '' : 'none';
  document.getElementById('school-filters').style.display = tab === 'all' ? '' : 'none';

  if (tab === 'fav') renderFavs();
}

/* ══════════════════════════════════════
   RENDER HELPERS
══════════════════════════════════════ */
function circleLabel(c) { return c === 0 ? 'Truque' : `${c}º Círculo`; }

function spellItemHTML(s, idx, listId) {
  const color = SC[s.school] || '#888';
  const isSaved = favorites.has(s.name);
  const tags = [
    s.concentration ? `<span class="mini-tag" style="background:${color}88">C</span>` : '',
    s.ritual        ? `<span class="mini-tag" style="background:#44336688">R</span>` : '',
  ].join('');

  return `<div class="spell-item" style="--school-color:${color}" data-list="${listId}" data-idx="${idx}">
    <div class="school-bar" style="background:${color}"></div>
    <div class="spell-item-body">
      <div class="spell-item-name">${s.name}</div>
      <div class="spell-item-sub">${circleLabel(s.circle)} · <span class="school-name" style="color:${color}">${s.school}</span></div>
    </div>
    <div class="spell-item-right">
      ${tags}
      <button class="fav-btn ${isSaved ? 'saved' : ''}" data-name="${s.name}" onclick="toggleFav(event,'${s.name}','${listId}')">
        ${isSaved ? '★' : '☆'}
      </button>
      <span class="chevron">›</span>
    </div>
  </div>`;
}

function attachListeners(container, spellArray, listId) {
  container.querySelectorAll(`.spell-item[data-list="${listId}"]`).forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.closest('.fav-btn')) return;
      openDetail(spellArray[+el.dataset.idx]);
    });
  });
}

/* ══════════════════════════════════════
   RENDER ALL
══════════════════════════════════════ */
function renderAll() {
  const q = searchVal.toLowerCase();
  const list = allSpells.filter(s => {
    if (activeSchool && s.school !== activeSchool) return false;
    if (q && !s.name.toLowerCase().includes(q) && !s.school.toLowerCase().includes(q)) return false;
    return true;
  });

  const wrap = document.getElementById('list-all');
  document.getElementById('spell-count').textContent = `${list.length} magia${list.length !== 1 ? 's' : ''}`;

  if (list.length === 0) {
    wrap.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">Nenhuma magia encontrada</div></div>`;
    return;
  }

  // Group by circle
  const groups = {};
  list.forEach(s => {
    const k = s.circle;
    if (!groups[k]) groups[k] = [];
    groups[k].push(s);
  });

  let html = '';
  let idx = 0;
  const globalList = [];

  Object.keys(groups).sort((a,b) => +a - +b).forEach(circle => {
    const label = circle === '0' ? 'Truques' : `${circle}º Círculo`;
    html += `<div class="section-label">${label}</div>`;
    groups[circle].forEach(s => {
      html += spellItemHTML(s, globalList.length, 'all');
      globalList.push(s);
    });
  });

  wrap.innerHTML = html;
  attachListeners(wrap, globalList, 'all');
}

/* ══════════════════════════════════════
   RENDER FAVS
══════════════════════════════════════ */
function renderFavs() {
  const favSpells = allSpells.filter(s => favorites.has(s.name));
  const wrap = document.getElementById('list-fav');

  if (favSpells.length === 0) {
    wrap.innerHTML = `<div class="empty">
      <div class="empty-icon">☆</div>
      <div class="empty-title">Grimório vazio</div>
      <div class="empty-sub">Toque em ☆ em qualquer magia<br>para adicioná-la aqui</div>
    </div>`;
    return;
  }

  let html = `<div class="section-label">${favSpells.length} magia${favSpells.length !== 1 ? 's' : ''} salva${favSpells.length !== 1 ? 's' : ''}</div>`;
  favSpells.forEach((s, i) => { html += spellItemHTML(s, i, 'fav'); });

  wrap.innerHTML = html;
  attachListeners(wrap, favSpells, 'fav');
}

/* ══════════════════════════════════════
   FAVORITES
══════════════════════════════════════ */
function toggleFav(e, name, listId) {
  e.stopPropagation();
  const btn = e.currentTarget;

  if (favorites.has(name)) {
    favorites.delete(name);
    btn.classList.remove('saved');
    btn.textContent = '☆';
  } else {
    favorites.add(name);
    btn.classList.add('saved');
    btn.textContent = '★';
  }
  saveFavs();
  updateBadge();

  // Sync the other list's button for same spell
  document.querySelectorAll(`.fav-btn[data-name="${name}"]`).forEach(b => {
    b.classList.toggle('saved', favorites.has(name));
    b.textContent = favorites.has(name) ? '★' : '☆';
  });

  // Sync sheet button if open
  if (currentSpell && currentSpell.name === name) updateSheetFavBtn();

  if (listId === 'fav') renderFavs();
}

function toggleFavFromSheet() {
  if (!currentSpell) return;
  const name = currentSpell.name;
  if (favorites.has(name)) { favorites.delete(name); } else { favorites.add(name); }
  saveFavs();
  updateBadge();
  updateSheetFavBtn();

  // Sync list buttons
  document.querySelectorAll(`.fav-btn[data-name="${name}"]`).forEach(b => {
    b.classList.toggle('saved', favorites.has(name));
    b.textContent = favorites.has(name) ? '★' : '☆';
  });

  if (currentTab === 'fav') renderFavs();
}

function updateSheetFavBtn() {
  if (!currentSpell) return;
  const isSaved = favorites.has(currentSpell.name);
  const btn = document.getElementById('sheet-fav-btn');
  document.getElementById('sheet-fav-star').textContent = isSaved ? '★' : '☆';
  document.getElementById('sheet-fav-label').textContent = isSaved ? 'Salvo' : 'Salvar';
  btn.classList.toggle('saved', isSaved);
}

function updateBadge() {
  const badge = document.getElementById('fav-badge');
  const n = favorites.size;
  badge.textContent = n;
  badge.classList.toggle('visible', n > 0);
}

/* ══════════════════════════════════════
   DETAIL SHEET
══════════════════════════════════════ */
function openDetail(s) {
  currentSpell = s;
  const color = SC[s.school] || '#888';

  document.getElementById('sheet-strip').style.background = color;
  document.getElementById('sheet-name').textContent = s.name;

  document.getElementById('sheet-meta').innerHTML = [
    `<span class="sheet-circle" style="color:${color}">${circleLabel(s.circle)} de ${s.school}</span>`,
    s.concentration ? `<span class="sheet-tag" style="background:${color}99">Concentração</span>` : '',
    s.ritual ? `<span class="sheet-tag" style="background:#55336688">Ritual</span>` : '',
  ].filter(Boolean).join('');

  document.getElementById('sheet-props').innerHTML = [
    ['Tempo de Conjuração', s.castTime],
    ['Alcance', s.range],
    ['Duração', s.duration],
    ['Componentes', s.components],
  ].map(([l, v]) => `<div class="sheet-prop">
    <div class="sheet-prop-label" style="color:${color}">${l}</div>
    <div class="sheet-prop-val">${v || '—'}</div>
  </div>`).join('');

  document.getElementById('sheet-desc').textContent = s.description;

  const upEl = document.getElementById('sheet-upcast');
  if (s.upcast) {
    upEl.style.display = '';
    upEl.style.borderLeftColor = color;
    upEl.innerHTML = `<span class="sheet-upcast-label" style="color:${color}">Círculo Superior</span>${s.upcast}`;
  } else {
    upEl.style.display = 'none';
  }

  document.getElementById('sheet-classes').innerHTML = s.classes.map(c =>
    `<span class="class-pill">${CLASS_ICONS[c] || ''} ${c}</span>`
  ).join('');

  updateSheetFavBtn();

  const overlay = document.getElementById('overlay');
  overlay.classList.add('open');
  // Scroll sheet to top
  document.getElementById('sheet').scrollTop = 0;
}

function closeDetail() {
  document.getElementById('overlay').classList.remove('open');
  currentSpell = null;
}

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeDetail();
});

// Swipe down to close
let ty0 = 0;
const sheet = document.getElementById('sheet');
sheet.addEventListener('touchstart', e => { ty0 = e.touches[0].clientY; }, { passive: true });
sheet.addEventListener('touchend', e => {
  if (e.changedTouches[0].clientY - ty0 > 80 && sheet.scrollTop === 0) closeDetail();
}, { passive: true });

/* ══════════════════════════════════════
   SCHOOL FILTERS
══════════════════════════════════════ */
function buildFilters() {
  const c = document.getElementById('school-filters');
  let html = `<button class="chip active" style="--chip-color:var(--gold)" data-school="">Todas</button>`;
  Object.entries(SC).forEach(([school, color]) => {
    html += `<button class="chip" style="--chip-color:${color}" data-school="${school}">${school}</button>`;
  });
  c.innerHTML = html;
  c.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => {
      activeSchool = btn.dataset.school || null;
      c.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderAll();
    });
  });
}

/* ══════════════════════════════════════
   SEARCH
══════════════════════════════════════ */
document.getElementById('search').addEventListener('input', e => {
  searchVal = e.target.value;
  renderAll();
});

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
fetch('spells.json')
  .then(r => r.json())
  .then(data => {
    allSpells = data.filter(s => s.name.length < 50 && !s.name.endsWith(','));
    allSpells.sort((a, b) => {
      if (a.circle !== b.circle) return a.circle - b.circle;
      return a.name.localeCompare(b.name, 'pt-BR');
    });
    buildFilters();
    renderAll();
    updateBadge();
  })
  .catch(() => {
    document.getElementById('list-all').innerHTML =
      `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Erro ao carregar</div><div class="empty-sub">Verifique o arquivo spells.json</div></div>`;
  });

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
